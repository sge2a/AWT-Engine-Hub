<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fireworks Line Art</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let w, h, dpr;
  const palette = ['#0a1628','#1a3a5c','#2d6a9f','#4fc3f7','#b3e5fc'];
  const seed = 534506539073;
  let rng = mulberry32(seed);

  const fireworks = [];
  const particles = [];
  const trails = [];
  let lastTime = 0;

  const pointer = {x:0.5,y:0.5,active:false};

  function resize(){
    dpr = devicePixelRatio || 1;
    w = innerWidth; h = innerHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener('resize', resize);
  resize();

  addEventListener('pointermove', e=>{
    pointer.x = e.clientX / w;
    pointer.y = e.clientY / h;
    pointer.active = true;
  });
  addEventListener('pointerleave', ()=>pointer.active=false);

  function mulberry32(a){
    return function(){
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t>>>15, t | 1);
      t ^= t + Math.imul(t ^ t>>>7, t | 61);
      return ((t ^ t>>>14) >>> 0) / 4294967296;
    }
  }
  function rand(min=0,max=1){return min + (max-min)*rng();}
  function easeOutCubic(t){return 1 - Math.pow(1-t,3);}
  function easeInOutSine(t){return -(Math.cos(Math.PI*t)-1)/2;}

  function spawnFirework(){
    const x = rand(0.15,0.85)*w;
    const y = h + 20;
    const tx = rand(0.2,0.8)*w;
    const ty = rand(0.2,0.5)*h;
    fireworks.push({
      x,y, tx,ty,
      t:0, dur: rand(1.2,1.8),
      color: palette[(rng()*palette.length)|0],
      seed: rand(0,Math.PI*2)
    });
  }

  function explode(fw){
    const count = 60 + (rng()*60|0);
    for(let i=0;i<count;i++){
      const ang = (i/count)*Math.PI*2 + rand(-0.2,0.2);
      const spd = rand(0.8,2.2);
      particles.push({
        x: fw.tx,
        y: fw.ty,
        vx: Math.cos(ang)*spd,
        vy: Math.sin(ang)*spd,
        life: 0,
        dur: rand(1.0,2.2),
        color: palette[(rng()*palette.length)|0],
        seed: rand(0,Math.PI*2)
      });
    }
    for(let i=0;i<20;i++){
      trails.push({
        x: fw.tx, y: fw.ty,
        ang: rand(0,Math.PI*2),
        life:0, dur:rand(0.8,1.4),
        radius: rand(30,80),
        color: fw.color
      });
    }
  }

  function update(dt){
    // spawn
    if(fireworks.length < 3 && rng() < 0.04){
      spawnFirework();
    }
    // update fireworks
    for(let i=fireworks.length-1;i>=0;i--){
      const f = fireworks[i];
      f.t += dt / f.dur;
      const t = Math.min(f.t,1);
      const e = easeOutCubic(t);
      f.x = f.x + (f.tx - f.x)*e;
      f.y = f.y + (f.ty - f.y)*e;
      if(t>=1){
        explode(f);
        fireworks.splice(i,1);
      }
    }
    // update particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life += dt;
      const t = p.life / p.dur;
      p.vx *= 0.99;
      p.vy += 0.015; // gravity
      p.x += p.vx*dt*60;
      p.y += p.vy*dt*60;
      if(t>=1) particles.splice(i,1);
    }
    // update trails
    for(let i=trails.length-1;i>=0;i--){
      const tr = trails[i];
      tr.life += dt;
      if(tr.life>=tr.dur) trails.splice(i,1);
    }
  }

  function draw(){
    ctx.fillStyle = 'rgba(10,10,10,0.2)';
    ctx.fillRect(0,0,w,h);

    // subtle background gradient
    const g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'rgba(10,22,40,0.4)');
    g.addColorStop(1,'rgba(10,10,10,0.0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);

    // draw trails circles
    ctx.lineWidth = 1;
    for(const tr of trails){
      const t = tr.life / tr.dur;
      const e = easeInOutSine(t);
      ctx.strokeStyle = hexToRgba(tr.color, 0.4*(1-t));
      ctx.beginPath();
      const r = tr.radius * e;
      ctx.arc(tr.x, tr.y, r, 0, Math.PI*2);
      ctx.stroke();
    }

    // draw fireworks paths
    for(const f of fireworks){
      ctx.strokeStyle = hexToRgba(f.color,0.8);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(f.x, f.y);
      ctx.lineTo(f.tx, f.ty);
      ctx.stroke();
    }

    // draw particles
    for(const p of particles){
      const t = p.life / p.dur;
      const e = easeOutCubic(1-t);
      ctx.strokeStyle = hexToRgba(p.color, 0.7*e);
      ctx.lineWidth = 1;
      const len = 6*e;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx*len, p.y - p.vy*len);
      ctx.stroke();
    }

    // subtle pointer ripple
    if(pointer.active){
      const px = pointer.x*w;
      const py = pointer.y*h;
      ctx.strokeStyle = 'rgba(79,195,247,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(px,py,30+10*Math.sin(performance.now()*0.003),0,Math.PI*2);
      ctx.stroke();
    }
  }

  function hexToRgba(hex, a){
    const bigint = parseInt(hex.slice(1), 16);
    const r = (bigint>>16)&255;
    const g = (bigint>>8)&255;
    const b = bigint&255;
    return `rgba(${r},${g},${b},${a})`;
  }

  function loop(t){
    const now = t*0.001;
    const dt = Math.min(now - lastTime, 0.033) || 0.016;
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Magnetic Field Lines</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0a0a0a; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let w, h, dpr;
  const TAU = Math.PI * 2;

  const colors = ['#e94560', '#533483', '#0f3460', '#16213e'];
  const bg = '#0a0a2e';

  const mouse = { x: 0, y: 0, tx: 0, ty: 0, active: false };
  const particles = [];
  const COUNT = 1800;

  function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    w = canvas.width = innerWidth * dpr;
    h = canvas.height = innerHeight * dpr;
    ctx.scale(dpr, dpr);
  }

  window.addEventListener('resize', () => {
    ctx.setTransform(1,0,0,1,0,0);
    resize();
  });

  window.addEventListener('pointermove', e => {
    mouse.tx = e.clientX;
    mouse.ty = e.clientY;
    mouse.active = true;
  });
  window.addEventListener('pointerleave', () => mouse.active = false);

  const ease = t => t * t * (3 - 2 * t);

  function initParticles() {
    particles.length = 0;
    for (let i = 0; i < COUNT; i++) {
      particles.push(newParticle());
    }
  }

  function newParticle() {
    return {
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      px: 0,
      py: 0,
      speed: 0.5 + Math.random() * 1.5,
      hue: colors[Math.floor(Math.random() * colors.length)],
      life: Math.random() * 300 + 200
    };
  }

  function dipoleField(x, y, cx, cy, mx, my) {
    let rx = x - cx;
    let ry = y - cy;
    let r2 = rx*rx + ry*ry + 80;
    let r = Math.sqrt(r2);
    let r3 = r2 * r;
    let r5 = r3 * r2;
    let mdotr = mx*rx + my*ry;
    let k = 3 * mdotr / r5;
    return { x: k * rx - mx / r3, y: k * ry - my / r3 };
  }

  function field(x, y, t) {
    const cx = innerWidth * 0.5;
    const cy = innerHeight * 0.5;
    const angle = t * 0.0002;
    const mx = Math.cos(angle);
    const my = Math.sin(angle);
    let f = dipoleField(x, y, cx, cy, mx, my);

    const ox = cx + Math.cos(angle * 1.7) * 120;
    const oy = cy + Math.sin(angle * 1.3) * 120;
    const mx2 = Math.cos(-angle * 1.4);
    const my2 = Math.sin(-angle * 1.4);
    const f2 = dipoleField(x, y, ox, oy, mx2, my2);

    f.x += f2.x * 0.6;
    f.y += f2.y * 0.6;

    if (mouse.active) {
      let dx = x - mouse.x;
      let dy = y - mouse.y;
      let r2 = dx*dx + dy*dy + 100;
      let swirl = 200 / r2;
      f.x += -dy * swirl;
      f.y += dx * swirl;
    }
    return f;
  }

  function update(t) {
    if (mouse.active) {
      mouse.x += (mouse.tx - mouse.x) * 0.1;
      mouse.y += (mouse.ty - mouse.y) * 0.1;
    }

    ctx.fillStyle = 'rgba(10, 10, 46, 0.08)';
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    ctx.lineWidth = 1;
    for (let p of particles) {
      p.px = p.x;
      p.py = p.y;
      const f = field(p.x, p.y, t);
      let mag = Math.hypot(f.x, f.y) + 1e-5;
      let vx = (f.x / mag) * p.speed;
      let vy = (f.y / mag) * p.speed;
      let dist = Math.hypot(p.x - innerWidth/2, p.y - innerHeight/2);
      let u = Math.min(dist / (Math.min(innerWidth, innerHeight) * 0.45), 1);
      let mod = 0.3 + 1.2 * (1 - ease(u));
      p.x += vx * mod;
      p.y += vy * mod;
      p.life--;
      if (p.x < -50 || p.x > innerWidth+50 || p.y < -50 || p.y > innerHeight+50 || p.life <= 0) {
        Object.assign(p, newParticle());
        continue;
      }
      ctx.strokeStyle = p.hue;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(update);
  }

  resize();
  initParticles();
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, innerWidth, innerHeight);
  requestAnimationFrame(update);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Line Art Fireworks</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let w=0,h=0,dpr=1;

  // Offscreen background
  const bg = document.createElement('canvas');
  const bgCtx = bg.getContext('2d');

  // Palette (neon city)
  const paletteHex = ['#0a0a2e','#16213e','#e94560','#0f3460','#533483','#4ce0ff'];
  const palette = paletteHex.map(hexToRgb);

  // RNG
  const rng = mulberry32(72394509);
  const rand = (min=0,max=1)=>min+(max-min)*rng();

  // Entities
  const rockets = [];
  const sparks = [];
  const rings = [];

  const pointer = {x:0.5,y:0.5,active:false,down:false};

  function resize(){
    dpr = devicePixelRatio || 1;
    w = innerWidth; h = innerHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);

    bg.width = w; bg.height = h;
    drawBackground();
  }
  addEventListener('resize', resize);
  resize();

  // Interaction
  addEventListener('pointermove', e=>{
    pointer.x = e.clientX / w;
    pointer.y = e.clientY / h;
    pointer.active = true;
  });
  addEventListener('pointerdown', e=>{
    pointer.down = true;
    pointer.x = e.clientX / w;
    pointer.y = e.clientY / h;
    spawnRocket(pointer.x*w, pointer.y*h);
  });
  addEventListener('pointerup', ()=>pointer.down=false);
  addEventListener('pointerleave', ()=>pointer.active=false);

  // Helpers
  function hexToRgb(hex){
    const n = parseInt(hex.slice(1),16);
    return [n>>16&255,n>>8&255,n&255];
  }
  function rgba(c,a){return `rgba(${c[0]},${c[1]},${c[2]},${a})`;}
  function mulberry32(a){
    return function(){
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t>>>15, t | 1);
      t ^= t + Math.imul(t ^ t>>>7, t | 61);
      return ((t ^ t>>>14) >>> 0) / 4294967296;
    }
  }
  function easeOutCubic(t){return 1 - Math.pow(1-t,3);}
  function easeInOutSine(t){return -(Math.cos(Math.PI*t)-1)/2;}
  function bezier(t,p0,p1,p2,p3){
    const mt=1-t;
    return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
  }

  // Background cached
  function drawBackground(){
    const g = bgCtx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'#0a0a2e');
    g.addColorStop(0.5,'#16213e');
    g.addColorStop(1,'#0a0a0a');
    bgCtx.fillStyle = g;
    bgCtx.fillRect(0,0,w,h);

    // Nebula blobs
    for(let i=0;i<4;i++){
      const x = rand(0,w), y = rand(0,h*0.7), r = rand(120,300);
      const ng = bgCtx.createRadialGradient(x,y,0,x,y,r);
      ng.addColorStop(0,`rgba(83,52,131,${0.12})`);
      ng.addColorStop(1,'rgba(10,10,10,0)');
      bgCtx.fillStyle = ng;
      bgCtx.beginPath();
      bgCtx.arc(x,y,r,0,Math.PI*2);
      bgCtx.fill();
    }

    // Stars
    for(let i=0;i<160;i++){
      const x = rand(0,w), y = rand(0,h), r = rand(0.5,1.8);
      bgCtx.fillStyle = `rgba(255,255,255,${rand(0.1,0.4)})`;
      bgCtx.beginPath();
      bgCtx.arc(x,y,r,0,Math.PI*2);
      bgCtx.fill();
    }

    // Subtle skyline lines
    bgCtx.strokeStyle = 'rgba(15,52,96,0.35)';
    bgCtx.lineWidth = 1;
    for(let i=0;i<6;i++){
      const y = h*0.75 + i*12;
      bgCtx.beginPath();
      bgCtx.moveTo(0,y);
      bgCtx.lineTo(w,y);
      bgCtx.stroke();
    }
  }

  // Spawning
  function spawnRocket(tx,ty){
    const sx = rand(0.1,0.9)*w;
    const sy = h + 30;
    const ex = tx || rand(0.2,0.8)*w;
    const ey = ty || rand(0.15,0.5)*h;
    const cx1 = sx + rand(-80,80);
    const cy1 = sy - rand(80,180);
    const cx2 = ex + rand(-120,120);
    const cy2 = ey + rand(60,160);
    rockets.push({
      sx,sy,ex,ey,cx1,cy1,cx2,cy2,
      t:0,dur:rand(1.2,1.8),
      color: palette[(rng()*palette.length)|0],
      trail:[{x:sx,y:sy}],
      seed: rand(0,Math.PI*2)
    });
  }

  function explode(x,y,color){
    const count = 90 + (rng()*60|0);
    for(let i=0;i<count;i++){
      const ang = (i/count)*Math.PI*2 + rand(-0.25,0.25);
      const spd = rand(0.8,3.0);
      const life = rand(1.0,2.4);
      sparks.push({
        x,y,
        vx: Math.cos(ang)*spd,
        vy: Math.sin(ang)*spd,
        life:0,dur:life,
        color,
        size: rand(4,10),
        tw: rand(0,Math.PI*2),
        drag: rand(0.975,0.99),
        gravity: rand(0.015,0.035),
        split: rng() < 0.15
      });
    }
    rings.push({
      x,y,life:0,dur:rand(0.8,1.2),radius:rand(40,90),color
    });
  }

  // Update loop
  function update(dt){
    // Spawn rockets
    if(rockets.length < 5 && rng() < 0.05){
      spawnRocket();
    }

    // Update rockets
    for(let i=rockets.length-1;i>=0;i--){
      const r = rockets[i];
      r.t += dt / r.dur;
      const t = Math.min(r.t,1);
      const e = easeOutCubic(t);
      const x = bezier(e, r.sx, r.cx1, r.cx2, r.ex);
      const y = bezier(e, r.sy, r.cy1, r.cy2, r.ey);
      r.x = x; r.y = y;

      r.trail.push({x,y});
      if(r.trail.length>12) r.trail.shift();

      if(t>=1){
        explode(r.ex,r.ey,r.color);
        rockets.splice(i,1);
      }
    }

    // Update sparks
    for(let i=sparks.length-1;i>=0;i--){
      const p = sparks[i];
      p.life += dt;
      const t = p.life/p.dur;
      p.vx *= p.drag;
      p.vy = p.vy*p.drag + p.gravity;
      p.x += p.vx*dt*60;
      p.y += p.vy*dt*60;

      // Pointer attraction
      if(pointer.active){
        const px = pointer.x*w, py = pointer.y*h;
        const dx = px - p.x, dy = py - p.y;
        const d2 = dx*dx + dy*dy;
        if(d2 < 20000){
          const f = (1 - d2/20000) * 0.0025;
          p.vx += dx*f;
          p.vy += dy*f;
        }
      }

      // Split into micro burst
      if(p.split && t>0.5 && rng()<0.02){
        p.split=false;
        explode(p.x,p.y,p.color);
      }

      if(t>=1){
        sparks[i] = sparks[sparks.length-1];
        sparks.pop();
      }
    }

    // Update rings
    for(let i=rings.length-1;i>=0;i--){
      const r = rings[i];
      r.life += dt;
      if(r.life>=r.dur){
        rings[i]=rings[rings.length-1];
        rings.pop();
      }
    }
  }

  // Render loop
  function draw(){
    // Fade and background
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(10,10,10,0.2)';
    ctx.fillRect(0,0,w,h);
    ctx.globalAlpha = 0.2;
    ctx.drawImage(bg,0,0,w,h);
    ctx.globalAlpha = 1;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Rings
    for(const r of rings){
      const t = r.life/r.dur;
      const e = easeInOutSine(t);
      const alpha = (1-t)*0.5;
      ctx.strokeStyle = rgba(r.color, alpha);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(r.x,r.y,r.radius*e,0,Math.PI*2);
      ctx.stroke();
    }

    // Rockets
    for(const r of rockets){
      ctx.strokeStyle = rgba(r.color,0.8);
      ctx.lineWidth = 1;
      ctx.beginPath();
      const tr = r.trail;
      if(tr.length>1){
        ctx.moveTo(tr[0].x,tr[0].y);
        for(let i=1;i<tr.length;i++) ctx.lineTo(tr[i].x,tr[i].y);
        ctx.stroke();
      }
      // head sparkle
      ctx.strokeStyle = rgba(r.color,1);
      ctx.beginPath();
      ctx.arc(r.x,r.y,1.5,0,Math.PI*2);
      ctx.stroke();
    }

    // Sparks with additive glow
    ctx.globalCompositeOperation = 'lighter';
    for(const p of sparks){
      const t = p.life/p.dur;
      const e = easeOutCubic(1-t);
      const flick = 0.65 + 0.35*Math.sin(p.tw + t*12);
      const alpha = e*0.7*flick;
      const len = p.size*e;
      ctx.strokeStyle = rgba(p.color, alpha);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx*len, p.y - p.vy*len);
      ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';

    // Pointer ripple
    if(pointer.active){
      const px = pointer.x*w, py = pointer.y*h;
      const r = 26 + 6*Math.sin(performance.now()*0.004);
      ctx.strokeStyle = 'rgba(79,224,255,0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(px,py,r,0,Math.PI*2);
      ctx.stroke();
    }
  }

  let last=0;
  function loop(t){
    const now = t*0.001;
    const dt = Math.min(now-last,0.033) || 0.016;
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>

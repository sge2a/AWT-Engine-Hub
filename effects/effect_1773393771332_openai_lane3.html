<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fireworks Evolution</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0a0a;}
canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let w,h,dpr;

  // Cosmic palette
  const palette = ['#0d0015','#1a0033','#6a0dad','#9b59b6','#d4a5ff']
    .map(hex => {
      const v = parseInt(hex.slice(1),16);
      return {hex, r:(v>>16)&255, g:(v>>8)&255, b:v&255};
    });

  const rockets = [];
  const sparks = [];
  const rings = [];
  const pointer = {x:0.5,y:0.5,active:false,down:false};

  let bgCanvas, bgCtx, lastTime = 0;

  // RNG
  const seed = 8080123456;
  let rng = mulberry32(seed);
  function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
  const rand = (min=0,max=1)=>min+(max-min)*rng();
  const clamp = (v,min,max)=>v<min?min:v>max?max:v;

  // Easing
  const easeOutCubic = t => 1 - Math.pow(1-t,3);
  const easeInOutSine = t => -(Math.cos(Math.PI*t)-1)/2;
  const easeOutExpo = t => t===1?1:1-Math.pow(2,-10*t);

  function resize(){
    dpr = devicePixelRatio || 1;
    w = innerWidth; h = innerHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);

    // Pre-render background gradient & stars
    bgCanvas = document.createElement('canvas');
    bgCanvas.width = w*dpr;
    bgCanvas.height = h*dpr;
    bgCtx = bgCanvas.getContext('2d');
    bgCtx.setTransform(dpr,0,0,dpr,0,0);

    // gradient
    const g = bgCtx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,'#0d0015');
    g.addColorStop(0.6,'#0a0010');
    g.addColorStop(1,'#050008');
    bgCtx.fillStyle = g;
    bgCtx.fillRect(0,0,w,h);

    // stars
    bgCtx.fillStyle = 'rgba(212,165,255,0.45)';
    for(let i=0;i<200;i++){
      const x = rand(0,w), y = rand(0,h);
      const r = rand(0.5,1.5);
      bgCtx.globalAlpha = rand(0.1,0.6);
      bgCtx.beginPath();
      bgCtx.arc(x,y,r,0,Math.PI*2);
      bgCtx.fill();
    }
    bgCtx.globalAlpha = 1;
  }
  addEventListener('resize', resize);
  resize();

  // Interaction
  addEventListener('pointermove', e=>{
    pointer.x = e.clientX / w;
    pointer.y = e.clientY / h;
    pointer.active = true;
  });
  addEventListener('pointerleave', ()=>pointer.active=false);
  addEventListener('pointerdown', e=>{
    pointer.down = true;
    const px = e.clientX, py = e.clientY;
    spawnRocket(px, py, true);
  });
  addEventListener('pointerup', ()=>pointer.down=false);

  function rgba(c,a){return `rgba(${c.r},${c.g},${c.b},${a})`;}

  // Spawn a rocket
  function spawnRocket(tx=null, ty=null, fromPointer=false){
    const sx = rand(0.1,0.9)*w;
    const sy = h + 30;
    const targetX = tx ?? rand(0.15,0.85)*w;
    const targetY = ty ?? rand(0.15,0.55)*h;
    const c = palette[(rng()*palette.length)|0];
    const ctrl = {
      x: (sx+targetX)/2 + rand(-0.2,0.2)*w,
      y: (sy+targetY)/2 - rand(0.2,0.4)*h
    };
    rockets.push({
      sx,sy, x:sx,y:sy, tx:targetX, ty:targetY,
      cx:ctrl.x, cy:ctrl.y,
      t:0, dur: rand(1.1,1.7),
      color:c, fromPointer
    });
  }

  function explode(fw){
    const layers = 2 + (rng()*2|0);
    for(let l=0;l<layers;l++){
      const count = 70 + (rng()*60|0);
      const speed = rand(1.2,2.6) * (1 + l*0.5);
      const spread = Math.PI*2;
      const base = rand(0,Math.PI*2);
      for(let i=0;i<count;i++){
        const ang = base + (i/count)*spread + rand(-0.05,0.05);
        const spd = speed * rand(0.6,1.2);
        const shape = (rng()*3)|0;
        sparks.push({
          x: fw.tx, y: fw.ty,
          vx: Math.cos(ang)*spd,
          vy: Math.sin(ang)*spd,
          life: 0, dur: rand(1.1,2.4),
          size: rand(1.0,2.4),
          color: palette[(rng()*palette.length)|0],
          shape,
          spin: rand(-3,3),
          tw: rand(0.5,1.5)
        });
      }
    }
    // Rings / shockwaves
    for(let i=0;i<2;i++){
      rings.push({
        x: fw.tx, y: fw.ty,
        life:0, dur: rand(0.8,1.4),
        radius: rand(40,80),
        width: rand(1.5,3.5),
        color: fw.color
      });
    }
    // Core bloom
    rings.push({
      x: fw.tx, y: fw.ty,
      life:0, dur: 0.6,
      radius: 20,
      width: 8,
      color: palette[palette.length-1]
    });
  }

  function update(dt){
    // Auto spawn
    if(rockets.length < 5 && rng() < 0.04){
      if(pointer.active && rng()<0.3) spawnRocket(pointer.x*w, pointer.y*h);
      else spawnRocket();
    }

    // Update rockets
    for(let i=rockets.length-1;i>=0;i--){
      const r = rockets[i];
      r.t += dt / r.dur;
      const t = clamp(r.t,0,1);
      const e = easeOutCubic(t);
      // quadratic bezier
      const u = 1 - e;
      r.x = u*u*r.sx + 2*u*e*r.cx + e*e*r.tx;
      r.y = u*u*r.sy + 2*u*e*r.cy + e*e*r.ty;
      if(t>=1){
        explode(r);
        rockets.splice(i,1);
      }
    }

    // Update sparks
    for(let i=sparks.length-1;i>=0;i--){
      const p = sparks[i];
      p.life += dt;
      const t = p.life / p.dur;
      p.vx *= 0.985;
      p.vy = p.vy*0.985 + 0.04; // gravity
      p.x += p.vx*dt*60;
      p.y += p.vy*dt*60;
      if(t>=1 || p.y > h+100) sparks.splice(i,1);
    }

    // Update rings
    for(let i=rings.length-1;i>=0;i--){
      const r = rings[i];
      r.life += dt;
      if(r.life >= r.dur) rings.splice(i,1);
    }
  }

  function draw(){
    // Motion blur fade
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(10,0,15,0.18)';
    ctx.fillRect(0,0,w,h);

    // Background
    ctx.globalAlpha = 0.9;
    ctx.drawImage(bgCanvas,0,0,w,h);
    ctx.globalAlpha = 1;

    // Rings / shockwaves
    ctx.globalCompositeOperation = 'lighter';
    for(const r of rings){
      const t = r.life / r.dur;
      const e = easeOutExpo(t);
      const rad = r.radius * e;
      const a = (1-t)*0.5;
      ctx.strokeStyle = rgba(r.color, a);
      ctx.lineWidth = r.width * (1-t);
      ctx.beginPath();
      ctx.arc(r.x, r.y, rad, 0, Math.PI*2);
      ctx.stroke();
    }

    // Rocket trails
    ctx.globalCompositeOperation = 'lighter';
    for(const r of rockets){
      ctx.strokeStyle = rgba(r.color,0.7);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(r.sx, r.sy);
      ctx.quadraticCurveTo(r.cx, r.cy, r.x, r.y);
      ctx.stroke();

      // Head glow
      ctx.fillStyle = rgba(r.color,0.9);
      ctx.beginPath();
      ctx.arc(r.x, r.y, 3, 0, Math.PI*2);
      ctx.fill();
    }

    // Sparks
    ctx.globalCompositeOperation = 'lighter';
    for(const p of sparks){
      const t = p.life / p.dur;
      const e = easeOutCubic(1-t);
      const alpha = e * (0.8 + 0.2*Math.sin(p.life*10*p.tw));
      ctx.strokeStyle = rgba(p.color, alpha);
      ctx.fillStyle = rgba(p.color, alpha);
      const len = 8*e;
      if(p.shape===0){
        ctx.lineWidth = p.size;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx*len, p.y - p.vy*len);
        ctx.stroke();
      } else if(p.shape===1){
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.spin + p.life);
        const s = p.size*3*e;
        ctx.fillRect(-s/2,-s/2,s,s);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.spin + p.life*1.5);
        const s = p.size*3*e;
        ctx.beginPath();
        ctx.moveTo(0,-s);
        ctx.lineTo(s, s);
        ctx.lineTo(-s, s);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Pointer ripple
    if(pointer.active){
      const px = pointer.x*w, py = pointer.y*h;
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(212,165,255,0.15)';
      ctx.lineWidth = 1.2;
      const r = 28 + 6*Math.sin(performance.now()*0.003);
      ctx.beginPath();
      ctx.arc(px,py,r,0,Math.PI*2);
      ctx.stroke();
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  function loop(t){
    const now = t*0.001;
    const dt = Math.min(now - lastTime, 0.033) || 0.016;
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pixel Fireworks</title>
<style>
  /* ===== Global Reset & Scene ===== */
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
  }
  :root { --boost: 1; }
  body:hover { --boost: 1.25; }
  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(2px 2px at 20% 30%, #1a0a00 40%, transparent 60%),
      radial-gradient(2px 2px at 80% 20%, #1a0a00 40%, transparent 60%),
      radial-gradient(2px 2px at 70% 80%, #1a0a00 40%, transparent 60%),
      radial-gradient(2px 2px at 30% 70%, #1a0a00 40%, transparent 60%),
      #0a0a0a;
    image-rendering: pixelated;
  }

  /* ===== Firework Structure ===== */
  .firework {
    position: absolute;
    width: 0;
    height: 0;
    pointer-events: none;
    transform: translate3d(0,0,0);
  }
  .firework::before {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    left: -3px;
    top: -3px;
    background: #ffd700;
    box-shadow: 0 0 8px #ffd700;
    animation: flash var(--duration) ease-out infinite;
    animation-delay: var(--delay);
  }

  .p {
    position: absolute;
    width: 4px;
    height: 4px;
    left: -2px;
    top: -2px;
    background: currentColor;
    box-shadow: 0 0 6px currentColor;
    filter: drop-shadow(0 0 4px currentColor);
    animation: blast var(--duration) cubic-bezier(0.2, 0.6, 0.2, 1) infinite;
    animation-delay: calc(var(--delay) + var(--extra, 0s));
    transform: translate3d(0,0,0);
  }

  /* ===== Particle Directions ===== */
  .p:nth-child(1)  { --dx: 0;   --dy: -90; color:#ffd700; }
  .p:nth-child(2)  { --dx: 70;  --dy: -70; color:#ff8c00; }
  .p:nth-child(3)  { --dx: 90;  --dy: 0;   color:#ff4500; }
  .p:nth-child(4)  { --dx: 70;  --dy: 70;  color:#8b2500; }
  .p:nth-child(5)  { --dx: 0;   --dy: 90;  color:#ff8c00; }
  .p:nth-child(6)  { --dx: -70; --dy: 70;  color:#ff4500; }
  .p:nth-child(7)  { --dx: -90; --dy: 0;   color:#ffd700; }
  .p:nth-child(8)  { --dx: -70; --dy: -70; color:#ff8c00; }
  .p:nth-child(9)  { --dx: 30;  --dy: -110; color:#ffd700; --extra: .04s; }
  .p:nth-child(10) { --dx: 110; --dy: 30;  color:#ff4500; --extra: .06s; }
  .p:nth-child(11) { --dx: -30; --dy: 110; color:#8b2500; --extra: .08s; }
  .p:nth-child(12) { --dx: -110;--dy: -30; color:#ff8c00; --extra: .1s; }
  .p:nth-child(13) { --dx: 45;  --dy: -45; color:#ffd700; --extra: .12s; }
  .p:nth-child(14) { --dx: 45;  --dy: 45;  color:#ff8c00; --extra: .14s; }
  .p:nth-child(15) { --dx: -45; --dy: 45;  color:#ff4500; --extra: .16s; }
  .p:nth-child(16) { --dx: -45; --dy: -45; color:#ffd700; --extra: .18s; }

  /* ===== Animations ===== */
  @keyframes blast {
    0% {
      opacity: 0;
      transform: translate(0,0) scale(0.2);
    }
    8% {
      opacity: 1;
    }
    60% {
      opacity: 0.9;
    }
    100% {
      opacity: 0;
      transform:
        translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px + 20px))
        scale(calc(0.2 * var(--boost)));
    }
  }

  @keyframes flash {
    0%   { opacity: 0; transform: scale(0.2); }
    6%   { opacity: 1; transform: scale(1.5); }
    20%  { opacity: 0; transform: scale(0.2); }
    100% { opacity: 0; transform: scale(0.2); }
  }
</style>
</head>
<body>
  <div id="scene">
    <!-- Firework 1 -->
    <div class="firework" style="left:15%; top:55%; --delay:0s; --duration:4.8s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
    <!-- Firework 2 -->
    <div class="firework" style="left:35%; top:40%; --delay:1.1s; --duration:5.2s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
    <!-- Firework 3 -->
    <div class="firework" style="left:55%; top:60%; --delay:2.2s; --duration:4.6s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
    <!-- Firework 4 -->
    <div class="firework" style="left:75%; top:45%; --delay:0.7s; --duration:5.6s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
    <!-- Firework 5 -->
    <div class="firework" style="left:50%; top:30%; --delay:3.0s; --duration:4.9s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
    <!-- Firework 6 -->
    <div class="firework" style="left:25%; top:70%; --delay:2.8s; --duration:5.3s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
    <!-- Firework 7 -->
    <div class="firework" style="left:85%; top:65%; --delay:4.1s; --duration:5.0s;">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>
  </div>
</body>
</html>
